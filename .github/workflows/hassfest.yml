name: Hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Hassfest Validation
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/github/workspace" -w /github/workspace ghcr.io/home-assistant/hassfest:latest
